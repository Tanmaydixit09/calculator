<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css.new">
    <title>Advanced Calculator</title>
    
</head>
<body>
    <div class="calculator">
    <input type="text" placeholder="0" id="inputBox">
    
    <!-- Memory row -->
    <div>
        <button class="memory">MC</button>
        <button class="memory">MR</button>
        <button class="memory">M+</button>
        <button class="memory">M-</button>
    </div>

    <!-- Top row -->
    <div>
        <button class="operator">AC</button>
        <button class="operator">DEL</button>
        <button class="function">%</button>
        <button class="operator">/</button>
    </div>

    <div>
        <button>7</button>
        <button>8</button>
        <button>9</button>
        <button class="operator">*</button>
    </div>

    <div>
        <button>4</button>
        <button>5</button>
        <button>6</button>
        <button class="operator">-</button>
    </div>

    <div>
        <button>1</button>
        <button>2</button>
        <button>3</button>
        <button class="operator">+</button>
    </div>

    <div>
        <button>00</button>
        <button>.</button>
        <button>0</button>
        <button class="equalBtn">=</button>
    </div>

    <!-- Scientific row -->
    <div class="sci-row">
        <button class="function">sin</button>
        <button class="function">cos</button>
        <button class="function">tan</button>
        <button class="function">log</button>
    </div>

    <div class="sci-row">
        <button class="function">sqrt</button>
        <button class="function">(</button>
        <button class="function">)</button>
        <button>π</button>
    </div>

    <!-- History -->
    <div id="history" class="history"></div>
    
</div>

<script src="script.js.new"></script>
</body>
</html>
